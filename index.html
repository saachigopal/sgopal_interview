<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scope — AI Agent Observability</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .bar-animate { transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
  </style>
</head>
<body class="bg-slate-50">
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

// ─── Mock Data ────────────────────────────────────────────────────────────────

const INITIAL_AGENTS = [
  {
    id: 1, name: "Customer Support Bot", model: "GPT-4o",
    createdAt: "Apr 10, 2026", observability: true,
    tokenUsage: 142300, estimatedCost: 4.27,
    logsUploaded: true, evaluationRun: true,
  },
  {
    id: 2, name: "Document Summarizer", model: "GPT-4o-mini",
    createdAt: "Apr 14, 2026", observability: true,
    tokenUsage: 89500, estimatedCost: 1.34,
    logsUploaded: true, evaluationRun: false,
  },
  {
    id: 3, name: "Code Review Agent", model: "o3",
    createdAt: "Apr 16, 2026", observability: false,
    tokenUsage: 0, estimatedCost: 0,
    logsUploaded: false, evaluationRun: false,
  },
];

const MOCK_EVAL_RESULTS = [
  { id: 1, input: "What is your return policy?", score: 0.91, status: "pass" },
  { id: 2, input: "How do I track my order?", score: 0.87, status: "pass" },
  { id: 3, input: "Can I change my shipping address?", score: 0.43, status: "fail" },
  { id: 4, input: "What payment methods do you accept?", score: 0.94, status: "pass" },
  { id: 5, input: "Is express shipping available?", score: 0.88, status: "pass" },
];

const PREBUILT_TESTS = [
  { id: "safety",   icon: "🛡️", name: "Safety Check",       desc: "No harmful or offensive content in responses",              category: "Safety" },
  { id: "length",   icon: "📏", name: "Response Length",     desc: "Response is between 50 and 500 tokens",                    category: "Format" },
  { id: "json",     icon: "{ }", name: "Valid JSON Output",  desc: "Response is parseable JSON when JSON output is expected",  category: "Format" },
  { id: "latency",  icon: "⚡",  name: "Latency Threshold",  desc: "Response time is under 3,000ms",                          category: "Performance" },
  { id: "no_pii",   icon: "🔒", name: "PII Detection",       desc: "Response does not expose personally identifiable info",    category: "Security" },
  { id: "grounded", icon: "📎", name: "Grounded Response",   desc: "Response references provided context or source documents", category: "Quality" },
];

const MOCK_FUNC_RESULTS = {
  safety:   { status: "pass", detail: "No unsafe content detected" },
  length:   { status: "pass", detail: "Avg 127 tokens — within range" },
  json:     { status: "na",   detail: "Not applicable for this agent" },
  latency:  { status: "fail", detail: "Avg 3,240ms — exceeds 3,000ms threshold" },
  no_pii:   { status: "pass", detail: "No PII patterns detected" },
  grounded: { status: "pass", detail: "94% of responses cite source context" },
};

const SAMPLE_LOG = `[
  {
    "traceId": "abc123def456",
    "spanId":  "span001",
    "timestamp": "2026-04-17T10:23:14Z",
    "input":  "What is your return policy?",
    "output": "You can return items within 30 days...",
    "model":  "GPT-4o",
    "tokens": { "prompt": 312, "completion": 87 },
    "latencyMs": 1240,
    "status": "success"
  }
]`;

const MODELS = ["GPT-4o", "GPT-4o-mini", "o3", "o1", "Claude 3.7 Sonnet", "Gemini 2.0 Flash"];

// ─── Shared UI Atoms ──────────────────────────────────────────────────────────

function Badge({ children, color = "slate" }) {
  const colors = {
    slate:   "bg-slate-100 text-slate-500",
    blue:    "bg-blue-100 text-blue-700",
    emerald: "bg-emerald-100 text-emerald-700",
    red:     "bg-red-100 text-red-700",
    purple:  "bg-purple-50 text-purple-600",
    amber:   "bg-amber-100 text-amber-700",
  };
  return (
    <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium ${colors[color]}`}>
      {children}
    </span>
  );
}

function ResultBadge({ status }) {
  if (status === "pass") return <Badge color="emerald">Pass</Badge>;
  if (status === "fail") return <Badge color="red">Fail</Badge>;
  return <Badge color="slate">N/A</Badge>;
}

function scoreTextColor(s) {
  return s >= 0.85 ? "text-emerald-600" : s >= 0.65 ? "text-amber-500" : "text-red-500";
}
function scoreBarColor(s) {
  return s >= 0.85 ? "bg-emerald-500" : s >= 0.65 ? "bg-amber-400" : "bg-red-400";
}
function fmt(n) { return n >= 1000 ? `${(n / 1000).toFixed(1)}K` : String(n); }

// ─── Create Agent Modal ────────────────────────────────────────────────────────

function CreateAgentModal({ onClose, onCreate }) {
  const [form, setForm] = useState({ name: "", description: "", model: "GPT-4o", observability: true });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg">

        {/* Header */}
        <div className="px-6 pt-6 pb-4 border-b border-slate-100">
          <h2 className="text-base font-semibold text-slate-900">Create New Agent</h2>
          <p className="text-sm text-slate-500 mt-0.5">Configure your agent and observability settings</p>
        </div>

        {/* Body */}
        <div className="px-6 py-5 space-y-4">
          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1.5">Agent Name</label>
            <input
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="e.g. Customer Support Bot"
              value={form.name}
              onChange={e => set("name", e.target.value)}
            />
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1.5">
              Description <span className="text-slate-400 font-normal">(optional)</span>
            </label>
            <textarea
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none"
              rows={2} placeholder="What does this agent do?"
              value={form.description}
              onChange={e => set("description", e.target.value)}
            />
          </div>

          <div>
            <label className="block text-sm font-medium text-slate-700 mb-1.5">Model</label>
            <select
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white"
              value={form.model} onChange={e => set("model", e.target.value)}
            >
              {MODELS.map(m => <option key={m}>{m}</option>)}
            </select>
          </div>

          {/* Observability Toggle */}
          <div className={`rounded-xl border-2 p-4 transition-all duration-200 ${form.observability ? "border-blue-200 bg-blue-50" : "border-slate-100 bg-slate-50"}`}>
            <div className="flex items-center justify-between">
              <div>
                <p className="text-sm font-semibold text-slate-800">Enable Observability</p>
                <p className="text-xs text-slate-500 mt-0.5">Auto-generate an OpenTelemetry config for this agent</p>
              </div>
              <button
                onClick={() => set("observability", !form.observability)}
                className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors duration-200 ${form.observability ? "bg-blue-600" : "bg-slate-300"}`}
              >
                <span className={`inline-block h-4 w-4 transform rounded-full bg-white shadow transition-transform duration-200 ${form.observability ? "translate-x-6" : "translate-x-1"}`} />
              </button>
            </div>

            {form.observability && (
              <div className="mt-3 flex items-start gap-2.5 bg-white rounded-lg px-3 py-2.5 border border-blue-100">
                <svg className="w-4 h-4 text-blue-500 mt-0.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p className="text-xs text-blue-700 leading-relaxed">
                  An OpenTelemetry configuration will be generated alongside this agent. Upload OTel-formatted logs to populate your observability dashboard.
                </p>
              </div>
            )}
          </div>
        </div>

        {/* Footer */}
        <div className="px-6 py-4 border-t border-slate-100 flex justify-end gap-3">
          <button onClick={onClose} className="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">
            Cancel
          </button>
          <button
            onClick={() => { if (form.name.trim()) { onCreate(form); onClose(); } }}
            disabled={!form.name.trim()}
            className="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
          >
            Create Agent
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Overview Tab ─────────────────────────────────────────────────────────────

function MetricCard({ label, value, sub, icon, bg }) {
  return (
    <div className={`rounded-xl border p-5 ${bg}`}>
      <div className="flex items-center justify-between mb-3">
        <span className="text-xs font-semibold text-slate-500 uppercase tracking-widest">{label}</span>
        <span className="text-xl">{icon}</span>
      </div>
      <p className="text-2xl font-bold text-slate-900 mb-0.5">{value}</p>
      <p className="text-xs text-slate-500">{sub}</p>
    </div>
  );
}

function OverviewTab({ agent }) {
  if (!agent.observability) return <EmptyState icon="📊" title="Observability not enabled" sub="Enable observability when creating an agent to see metrics here." />;

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-3 gap-4">
        <MetricCard label="Model"        value={agent.model}                     sub="Active configuration"   icon="🤖" bg="bg-blue-50 border-blue-100" />
        <MetricCard label="Token Usage"  value={fmt(agent.tokenUsage)}           sub="Total tokens consumed"  icon="🔢" bg="bg-purple-50 border-purple-100" />
        <MetricCard label="Est. Cost"    value={`$${agent.estimatedCost.toFixed(2)}`} sub="Based on current usage" icon="💰" bg="bg-emerald-50 border-emerald-100" />
      </div>

      {agent.logsUploaded && (
        <div>
          <h3 className="text-sm font-semibold text-slate-700 mb-3">Token Breakdown</h3>
          <div className="bg-white rounded-xl border border-slate-100 p-5 space-y-4">
            {[
              { label: "Prompt tokens",     value: 98400,  pct: 69 },
              { label: "Completion tokens", value: 43900,  pct: 31 },
            ].map(r => (
              <div key={r.label}>
                <div className="flex justify-between text-xs text-slate-600 mb-1.5">
                  <span>{r.label}</span>
                  <span className="font-semibold">{fmt(r.value)}</span>
                </div>
                <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                  <div className={`h-2 bg-blue-500 rounded-full bar-animate`} style={{ width: `${r.pct}%` }} />
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Evaluation Tab ────────────────────────────────────────────────────────────

function EvaluationTab({ agent }) {
  const [datasetFile,  setDatasetFile]  = useState(agent.evaluationRun ? "golden_dataset.json" : null);
  const [evalResults,  setEvalResults]  = useState(agent.evaluationRun ? MOCK_EVAL_RESULTS : null);
  const [enabledTests, setEnabledTests] = useState(
    agent.evaluationRun
      ? { safety: true, length: true, json: false, latency: true, no_pii: true, grounded: true }
      : {}
  );
  const [funcResults, setFuncResults] = useState(agent.evaluationRun ? MOCK_FUNC_RESULTS : null);
  const [customTests,  setCustomTests]  = useState(
    agent.evaluationRun
      ? [{ id: "c1", name: "No competitor mentions", assertion: "response.not_contains(['CompetitorX', 'CompetitorY'])", result: { status: "pass", detail: "No competitor names found" } }]
      : []
  );
  const [showAddCustom, setShowAddCustom] = useState(false);
  const [newTest, setNewTest] = useState({ name: "", assertion: "" });
  const fileRef = useRef();

  const avgScore  = evalResults ? evalResults.reduce((s, r) => s + r.score, 0) / evalResults.length : null;
  const passCount = evalResults ? evalResults.filter(r => r.status === "pass").length : 0;

  function handleRunEval()  { setEvalResults(MOCK_EVAL_RESULTS); }
  function handleRunTests() {
    const res = {};
    PREBUILT_TESTS.forEach(t => { if (enabledTests[t.id]) res[t.id] = MOCK_FUNC_RESULTS[t.id]; });
    setFuncResults(res);
    setCustomTests(ct => ct.map(t => ({ ...t, result: { status: "pass", detail: "Assertion passed on all log entries" } })));
  }

  function addCustomTest() {
    if (!newTest.name.trim()) return;
    setCustomTests(ct => [...ct, { id: `c${Date.now()}`, ...newTest, result: null }]);
    setNewTest({ name: "", assertion: "" });
    setShowAddCustom(false);
  }

  return (
    <div className="space-y-8">

      {/* ── Golden Dataset ── */}
      <section>
        <div className="flex items-start justify-between mb-3">
          <div>
            <h3 className="text-sm font-semibold text-slate-800">Golden Dataset Evaluation</h3>
            <p className="text-xs text-slate-500 mt-0.5">
              Upload a JSON array of <code className="bg-slate-100 px-1 rounded">{"{ input, expected_output }"}</code> pairs
            </p>
          </div>
          {evalResults && (
            <div className="flex items-center gap-3 text-sm shrink-0">
              <span className={`font-bold text-base ${scoreTextColor(avgScore)}`}>{(avgScore * 100).toFixed(0)}%</span>
              <span className="text-slate-400 text-xs">{passCount}/{evalResults.length} passed</span>
            </div>
          )}
        </div>

        {!datasetFile ? (
          <div
            onClick={() => fileRef.current.click()}
            className="border-2 border-dashed border-slate-200 rounded-xl p-10 text-center cursor-pointer hover:border-blue-300 hover:bg-blue-50/50 transition-all"
          >
            <div className="w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3">
              <svg className="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
              </svg>
            </div>
            <p className="text-sm font-medium text-slate-600">Upload golden dataset</p>
            <p className="text-xs text-slate-400 mt-1">JSON file · <code>[{"{ input, expected_output }"}]</code></p>
            <input ref={fileRef} type="file" accept=".json" className="hidden"
              onChange={e => { if (e.target.files[0]) setDatasetFile(e.target.files[0].name); }} />
          </div>
        ) : (
          <div className="space-y-3">
            <div className="flex items-center gap-3 bg-white border border-slate-100 rounded-lg px-4 py-3">
              <svg className="w-4 h-4 text-emerald-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <span className="text-sm font-medium text-slate-700 flex-1">{datasetFile}</span>
              {!evalResults && (
                <button onClick={handleRunEval} className="px-3 py-1.5 bg-blue-600 text-white text-xs rounded-lg font-medium hover:bg-blue-700 transition-colors">
                  Run Evaluation
                </button>
              )}
              <button onClick={() => { setDatasetFile(null); setEvalResults(null); }}
                className="text-xs text-slate-400 hover:text-red-500 transition-colors">Remove</button>
            </div>

            {evalResults && (
              <div className="bg-white rounded-xl border border-slate-100 overflow-hidden">
                <table className="w-full text-sm">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-100">
                      <th className="text-left px-4 py-2.5 text-xs font-semibold text-slate-400 uppercase tracking-wide">Input</th>
                      <th className="text-left px-4 py-2.5 text-xs font-semibold text-slate-400 uppercase tracking-wide w-36">Score</th>
                      <th className="text-left px-4 py-2.5 text-xs font-semibold text-slate-400 uppercase tracking-wide w-20">Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    {evalResults.map((r, i) => (
                      <tr key={r.id} className={`border-b border-slate-50 last:border-0 ${i % 2 === 1 ? "bg-slate-50/40" : ""}`}>
                        <td className="px-4 py-3 text-slate-700">{r.input}</td>
                        <td className="px-4 py-3">
                          <div className="flex items-center gap-2">
                            <div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden">
                              <div className={`h-1.5 rounded-full bar-animate ${scoreBarColor(r.score)}`} style={{ width: `${r.score * 100}%` }} />
                            </div>
                            <span className={`text-xs font-bold w-8 ${scoreTextColor(r.score)}`}>{(r.score * 100).toFixed(0)}%</span>
                          </div>
                        </td>
                        <td className="px-4 py-3"><ResultBadge status={r.status} /></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}
      </section>

      {/* ── Functional Tests ── */}
      <section>
        <div className="flex items-center justify-between mb-3">
          <div>
            <h3 className="text-sm font-semibold text-slate-800">Functional Tests</h3>
            <p className="text-xs text-slate-500 mt-0.5">Enable pre-built checks or write custom assertions</p>
          </div>
          <div className="flex gap-2">
            <button onClick={() => setShowAddCustom(true)}
              className="text-xs px-3 py-1.5 border border-slate-200 rounded-lg font-medium text-slate-600 hover:border-slate-300 transition-colors">
              + Custom Test
            </button>
            <button onClick={handleRunTests}
              className="text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors">
              Run Tests
            </button>
          </div>
        </div>

        <div className="space-y-1.5">
          {PREBUILT_TESTS.map(test => {
            const result = funcResults?.[test.id];
            const enabled = !!enabledTests[test.id];
            return (
              <div key={test.id} className={`flex items-center gap-3 bg-white rounded-lg border px-4 py-3 transition-colors ${enabled ? "border-slate-200" : "border-slate-100"}`}>
                <input type="checkbox" checked={enabled}
                  onChange={() => setEnabledTests(e => ({ ...e, [test.id]: !e[test.id] }))}
                  className="w-4 h-4 accent-blue-600 cursor-pointer shrink-0" />
                <span className="text-base w-5 text-center shrink-0">{test.icon}</span>
                <div className="flex-1 min-w-0">
                  <p className="text-sm font-medium text-slate-700">{test.name}</p>
                  <p className="text-xs text-slate-400 truncate">{test.desc}</p>
                </div>
                <Badge color="slate">{test.category}</Badge>
                {result && enabled && (
                  <div className="flex items-center gap-2 shrink-0">
                    <ResultBadge status={result.status} />
                    <span className="text-xs text-slate-400 hidden xl:block max-w-40 truncate">{result.detail}</span>
                  </div>
                )}
              </div>
            );
          })}

          {customTests.map(test => (
            <div key={test.id} className="flex items-center gap-3 bg-white rounded-lg border border-purple-100 px-4 py-3">
              <span className="text-base w-5 text-center shrink-0">✏️</span>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-medium text-slate-700">{test.name}</p>
                <code className="text-xs text-slate-400 font-mono truncate block">{test.assertion}</code>
              </div>
              <Badge color="purple">Custom</Badge>
              {test.result && <ResultBadge status={test.result.status} />}
            </div>
          ))}
        </div>

        {showAddCustom && (
          <div className="mt-3 bg-slate-50 rounded-xl border border-slate-200 p-4 space-y-3">
            <p className="text-sm font-semibold text-slate-700">New Custom Test</p>
            <input
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Test name (e.g. No competitor mentions)"
              value={newTest.name} onChange={e => setNewTest(n => ({ ...n, name: e.target.value }))}
            />
            <input
              className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500"
              placeholder="Assertion (e.g. response.not_contains(['CompetitorX']))"
              value={newTest.assertion} onChange={e => setNewTest(n => ({ ...n, assertion: e.target.value }))}
            />
            <div className="flex gap-2 justify-end">
              <button onClick={() => setShowAddCustom(false)} className="text-xs px-3 py-1.5 text-slate-500 hover:text-slate-700">Cancel</button>
              <button onClick={addCustomTest} className="text-xs px-3 py-1.5 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">Add Test</button>
            </div>
          </div>
        )}
      </section>
    </div>
  );
}

// ─── Logs Tab ─────────────────────────────────────────────────────────────────

function LogsTab({ agent }) {
  const [logFile,     setLogFile]     = useState(agent.logsUploaded ? "otel_logs_apr17.json" : null);
  const [showPreview, setShowPreview] = useState(false);
  const fileRef = useRef();

  if (!agent.observability) return <EmptyState icon="📋" title="Observability not enabled" sub="Enable observability during agent creation to upload and view logs." />;

  return (
    <div className="space-y-5">
      <div>
        <h3 className="text-sm font-semibold text-slate-800 mb-1">Upload OTel Logs</h3>
        <p className="text-xs text-slate-500 mb-4">
          Upload JSON-formatted OpenTelemetry logs from your agent runtime. These power the metrics in Overview and Evaluation.
        </p>

        {!logFile ? (
          <div onClick={() => fileRef.current.click()}
            className="border-2 border-dashed border-slate-200 rounded-xl p-10 text-center cursor-pointer hover:border-blue-300 hover:bg-blue-50/50 transition-all">
            <div className="w-11 h-11 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-3">
              <svg className="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
              </svg>
            </div>
            <p className="text-sm font-medium text-slate-600">Upload OTel log file</p>
            <p className="text-xs text-slate-400 mt-1">OpenTelemetry JSON format</p>
            <input ref={fileRef} type="file" accept=".json" className="hidden"
              onChange={e => { if (e.target.files[0]) setLogFile(e.target.files[0].name); }} />
          </div>
        ) : (
          <div className="space-y-3">
            <div className="flex items-center gap-3 bg-white border border-slate-100 rounded-lg px-4 py-3">
              <svg className="w-4 h-4 text-emerald-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              <div className="flex-1">
                <p className="text-sm font-medium text-slate-700">{logFile}</p>
                <p className="text-xs text-slate-400">Loaded · Ready for evaluation</p>
              </div>
              <button onClick={() => setShowPreview(v => !v)} className="text-xs text-blue-600 hover:text-blue-700 font-medium">
                {showPreview ? "Hide" : "Preview"}
              </button>
              <button onClick={() => setLogFile(null)} className="text-xs text-slate-400 hover:text-red-500 transition-colors">Remove</button>
            </div>
            {showPreview && (
              <pre className="bg-slate-900 text-emerald-400 text-xs rounded-xl p-5 overflow-x-auto font-mono leading-relaxed">
                {SAMPLE_LOG}
              </pre>
            )}
          </div>
        )}
      </div>

      <div className="bg-blue-50 rounded-xl border border-blue-100 p-4">
        <p className="text-xs font-semibold text-blue-700 mb-1.5">Expected OTel Schema</p>
        <div className="flex flex-wrap gap-1.5">
          {["traceId", "spanId", "input", "output", "model", "tokens", "latencyMs", "status"].map(f => (
            <code key={f} className="bg-blue-100 text-blue-700 text-xs px-1.5 py-0.5 rounded">{f}</code>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Empty State ──────────────────────────────────────────────────────────────

function EmptyState({ icon, title, sub }) {
  return (
    <div className="flex flex-col items-center justify-center py-24 text-center">
      <div className="text-3xl mb-3">{icon}</div>
      <p className="text-sm font-semibold text-slate-700">{title}</p>
      <p className="text-xs text-slate-400 mt-1 max-w-xs">{sub}</p>
    </div>
  );
}

// ─── Agent Dashboard ──────────────────────────────────────────────────────────

function AgentDashboard({ agent, onBack }) {
  const [tab, setTab] = useState("overview");
  const TABS = [
    { id: "overview",   label: "Overview" },
    { id: "evaluation", label: "Evaluation" },
    { id: "logs",       label: "Logs" },
  ];

  return (
    <div className="flex-1 overflow-auto">
      <div className="max-w-4xl mx-auto px-8 py-8">

        {/* Breadcrumb */}
        <button onClick={onBack} className="flex items-center gap-1.5 text-sm text-slate-400 hover:text-slate-600 mb-6 transition-colors">
          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 19l-7-7 7-7" />
          </svg>
          All Agents
        </button>

        {/* Header */}
        <div className="mb-6">
          <h1 className="text-xl font-bold text-slate-900">{agent.name}</h1>
          <div className="flex items-center gap-2 mt-2 flex-wrap">
            <Badge color="slate">{agent.model}</Badge>
            <Badge color="emerald">Active</Badge>
            {agent.observability && <Badge color="blue">Observability On</Badge>}
            <span className="text-xs text-slate-400">Created {agent.createdAt}</span>
          </div>
        </div>

        {/* Tab Bar */}
        <div className="flex gap-0 mb-7 border-b border-slate-200">
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              className={`px-5 py-2.5 text-sm font-medium border-b-2 -mb-px transition-colors ${
                tab === t.id ? "border-blue-600 text-blue-600" : "border-transparent text-slate-500 hover:text-slate-700"
              }`}>
              {t.label}
            </button>
          ))}
        </div>

        {tab === "overview"   && <OverviewTab   agent={agent} />}
        {tab === "evaluation" && <EvaluationTab agent={agent} />}
        {tab === "logs"       && <LogsTab       agent={agent} />}
      </div>
    </div>
  );
}

// ─── Agent List ───────────────────────────────────────────────────────────────

function AgentListView({ agents, onSelect, onNew }) {
  return (
    <div className="flex-1 overflow-auto">
      <div className="max-w-4xl mx-auto px-8 py-8">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h1 className="text-xl font-bold text-slate-900">Agents</h1>
            <p className="text-sm text-slate-500 mt-0.5">{agents.length} agent{agents.length !== 1 ? "s" : ""} configured</p>
          </div>
          <button onClick={onNew}
            className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4" />
            </svg>
            New Agent
          </button>
        </div>

        <div className="space-y-2">
          {agents.map(agent => (
            <div key={agent.id} onClick={() => onSelect(agent)}
              className="bg-white rounded-xl border border-slate-100 px-5 py-4 flex items-center gap-4 cursor-pointer hover:border-blue-200 hover:shadow-sm transition-all group">
              <div className="w-9 h-9 rounded-lg bg-slate-100 flex items-center justify-center text-sm font-bold text-slate-500 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors shrink-0">
                {agent.name[0]}
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-sm font-semibold text-slate-800">{agent.name}</p>
                <p className="text-xs text-slate-400 mt-0.5">Created {agent.createdAt}</p>
              </div>
              <div className="flex items-center gap-2 shrink-0">
                <Badge color="slate">{agent.model}</Badge>
                {agent.observability
                  ? <Badge color="blue">Observability On</Badge>
                  : <span className="text-xs text-slate-300 px-2">No observability</span>
                }
                {agent.observability && agent.estimatedCost > 0 && (
                  <span className="text-xs font-semibold text-slate-500 w-14 text-right">${agent.estimatedCost.toFixed(2)}</span>
                )}
              </div>
              <svg className="w-4 h-4 text-slate-200 group-hover:text-blue-400 transition-colors shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 5l7 7-7 7" />
              </svg>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────

function Sidebar({ agents, selectedId, onSelect, onHome }) {
  return (
    <div className="w-52 bg-slate-900 flex flex-col h-screen shrink-0">
      {/* Logo */}
      <div className="px-5 py-5 border-b border-white/5">
        <div className="flex items-center gap-2.5">
          <div className="w-7 h-7 bg-blue-500 rounded-lg flex items-center justify-center shrink-0">
            <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </div>
          <span className="font-bold text-white text-base tracking-tight">Scope</span>
        </div>
      </div>

      {/* Nav */}
      <nav className="flex-1 px-3 py-4 overflow-y-auto space-y-1">
        <button onClick={onHome}
          className={`w-full text-left px-3 py-2 rounded-lg text-sm font-medium transition-colors ${
            !selectedId ? "bg-white/10 text-white" : "text-slate-400 hover:text-white hover:bg-white/5"
          }`}>
          All Agents
        </button>

        {agents.filter(a => a.observability).length > 0 && (
          <div className="pt-4">
            <p className="text-xs font-semibold text-slate-500 uppercase tracking-widest px-3 mb-2">Monitored</p>
            {agents.filter(a => a.observability).map(a => (
              <button key={a.id} onClick={() => onSelect(a)}
                className={`w-full text-left px-3 py-2 rounded-lg text-sm transition-colors truncate ${
                  selectedId === a.id ? "bg-blue-600 text-white" : "text-slate-400 hover:text-white hover:bg-white/5"
                }`}>
                {a.name}
              </button>
            ))}
          </div>
        )}
      </nav>

      <div className="px-5 py-4 border-t border-white/5">
        <p className="text-xs text-slate-500">Scope v0.1</p>
      </div>
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [agents,       setAgents]       = useState(INITIAL_AGENTS);
  const [selectedAgent, setSelectedAgent] = useState(null);
  const [showCreate,   setShowCreate]   = useState(false);

  function handleCreate(form) {
    const agent = {
      id: Date.now(), name: form.name, model: form.model,
      createdAt: "Apr 17, 2026", observability: form.observability,
      tokenUsage: 0, estimatedCost: 0, logsUploaded: false, evaluationRun: false,
    };
    setAgents(a => [...a, agent]);
    setSelectedAgent(agent);
  }

  return (
    <div className="flex h-screen overflow-hidden">
      <Sidebar
        agents={agents}
        selectedId={selectedAgent?.id}
        onSelect={setSelectedAgent}
        onHome={() => setSelectedAgent(null)}
      />
      <main className="flex-1 overflow-hidden flex bg-slate-50">
        {selectedAgent
          ? <AgentDashboard agent={selectedAgent} onBack={() => setSelectedAgent(null)} />
          : <AgentListView  agents={agents} onSelect={setSelectedAgent} onNew={() => setShowCreate(true)} />
        }
      </main>
      {showCreate && (
        <CreateAgentModal onClose={() => setShowCreate(false)} onCreate={handleCreate} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
